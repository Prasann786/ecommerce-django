
{% extends "./base.html" %}

{% block content %}

<div class="container mt-5">

<h2>My Orders</h2>

<table class="table table-bordered">

<tr>
<th>Order ID</th>
<th>Date</th>
<th>Total</th>
<th>Status</th>
</tr>

{% for order in orders %}

<tr>
<td>
<a href="{% url 'order-detail' order.id %}">
#{{ order.id }}
</a>
</td>
<td>{{ order.created_at }}</td>
<td>${{ order.total_price }}</td>
<td>{{ order.status }}</td>
</tr>

{% empty %}

<tr>
<td colspan="4">No orders found</td>
</tr>

{% endfor %}

</table>
<a href="{% url 'store' %}" class="btn btn-primary mt-3">
← Back to Home
</a>
</div>

{% endblock %}
